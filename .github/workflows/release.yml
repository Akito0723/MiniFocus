name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Package and release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve and verify version
        id: version
        shell: bash
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tags must use the vMAJOR.MINOR.PATCH format"
            exit 1
          fi

          version="${GITHUB_REF_NAME#v}"
          toc_version="$(sed -n 's/^## Version: *//p' MiniFocus.toc | tr -d '\r')"
          if [[ "$toc_version" != "$version" ]]; then
            echo "::error::Tag version $version does not match TOC version $toc_version"
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Validate Lua syntax
        run: |
          sudo apt-get update
          sudo apt-get install --yes lua5.4
          luac -p \
            Locales/enUS.lua \
            Locales/zhCN.lua \
            MiniFocus.lua \
            Adapters/NDui.lua

      - name: Build addon package
        shell: bash
        run: |
          package_root="package/MiniFocus"
          mkdir -p \
            "$package_root/Adapters" \
            "$package_root/Locales" \
            "$package_root/Media"

          cp MiniFocus.lua "$package_root/"
          cp MiniFocus.toc "$package_root/"
          cp Adapters/NDui.lua "$package_root/Adapters/"
          cp Locales/enUS.lua "$package_root/Locales/"
          cp Locales/zhCN.lua "$package_root/Locales/"
          cp Media/focus_interrupt_cast.ogg "$package_root/Media/"

          (
            cd package
            zip -r "../${{ steps.version.outputs.version }}.zip" MiniFocus
          )

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "${{ steps.version.outputs.version }}.zip" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            --verify-tag
